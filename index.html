<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lluvia App</title>
    <style>
        /* El fondo ahora es total para que no se vea nada raro */
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #161c28; /* Color de tu menú inferior */
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .app-iframe {
            width: 100%;
            /* Hacemos que la app sea un poquito más alta que la pantalla 
               para empujar el logo de Hércules hacia abajo */
            height: 105%; 
            border: none;
        }

        /* EL PARCHE INVISIBLE */
        .watermark-hider {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55px; /* Altura ideal para tapar el logo sin comerse los iconos */
            background-color: #161c28; /* COLOR EXACTO DE TU MENÚ */
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <iframe src="https://lluviapp01.onhercules.app/" class="app-iframe"></iframe>
        
        <div class="watermark-hider"></div>
    </div>
</body>
</html>
