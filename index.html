<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lluvia App</title>
    <style>
        /* Fondo total de la página: color gris oscuro del menú */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #161c28; 
            display: flex;
            flex-direction: column;
        }

        .app-container {
            position: relative;
            width: 100%;
            /* Ajustado al 96% para que la app sea más grande y baje más */
            height: 96%; 
            background-color: #0b1120;
        }

        .app-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* La cinta de cobertura: más delgada para no estorbar */
        .watermark-hider {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 32px; 
            background-color: #161c28; 
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <iframe src="https://lluviapp01.onhercules.app/" class="app-iframe"></iframe>
        <div class="watermark-hider"></div>
    </div>
</body>
</html>
