<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lluvia App</title>
    <style>
        /* Fondo total igual al menú para que el marco sea invisible */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #161c28; 
            display: flex;
            justify-content: center; /* Centra horizontal */
            align-items: center;     /* Centra vertical */
        }

        .app-container {
            position: relative;
            /* Usamos tus medidas exactas */
            width: 325px;
            height: 762px;
            background-color: #0b1120;
            box-shadow: 0 0 15px rgba(0,0,0,0.3); /* Sombra suave para que se vea pro */
        }

        .app-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Franja de seguridad ajustada */
        .watermark-hider {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35px; 
            background-color: #161c28; 
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <iframe src="https://lluviapp01.onhercules.app/" class="app-iframe"></iframe>
        
        <div class="watermark-hider"></div>
    </div>
</body>
</html>
