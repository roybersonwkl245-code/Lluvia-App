<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lluvia App</title>
    <style>
        /* Eliminamos cualquier margen para que no haya bordes laterales */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #0b1120; /* Fondo oscuro de carga */
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .app-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* PARCHE SOLO ABAJO: Sin bordes laterales */
        .watermark-hider {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55px; /* Altura suficiente para el logo */
            background-color: #161c28; /* Color exacto de tu menú */
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <iframe src="https://lluviapp01.onhercules.app/" class="app-iframe"></iframe>
        
        <div class="watermark-hider"></div>
    </div>
</body>
</html>
